name: Deploy Crush Date H5

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-crush-date-h5
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

      - name: Build H5
        env:
          # The H5 page and API share the same host. Keep requests relative so
          # the current HTTP deployment does not depend on the HTTPS domain.
          VITE_API_BASE_URL: ''
        run: pnpm build:h5

      - name: Validate H5 build
        run: |
          test -f dist/build/h5/index.html

          if ! grep -q '/eidolonh5/assets/' dist/build/h5/index.html; then
            echo 'H5 asset base is invalid; refusing to overwrite production.'
            cat dist/build/h5/index.html
            exit 1
          fi

          if grep -Rqs 'https://xuxiaoapi.online' dist/build/h5; then
            echo 'H5 still contains the unavailable HTTPS API domain.'
            exit 1
          fi

      - name: Deploy H5 to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: dist/build/h5/*
          target: /www/wwwroot/101.42.137.241/eidolonh5
          strip_components: 3
          rm: true
